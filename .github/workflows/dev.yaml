# Build (package Lambdas, Terraform fmt/validate) and deploy (Terraform apply, frontend, S3, CloudFront).
# Single job so Lambda zips stay on the runner for deploy (no artifact upload/download).
# Database migrations / seeding are not included.
#
# Secrets: see /.github.env

name: Dev CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
    permissions:
      contents: read
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Build (Lambda zips, Terraform fmt & validate)
        uses: ./.github/actions/build
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.DEFAULT_AWS_REGION }}
          tf_var_aurora_cluster_arn: ${{ secrets.TF_VAR_AURORA_CLUSTER_ARN }}
          tf_var_aurora_secret_arn: ${{ secrets.TF_VAR_AURORA_SECRET_ARN }}
          tf_var_vector_bucket: ${{ secrets.TF_VAR_VECTOR_BUCKET }}
          tf_var_polygon_api_key: ${{ secrets.TF_VAR_POLYGON_API_KEY }}
          tf_var_openai_api_key: ${{ secrets.TF_VAR_OPENAI_API_KEY }}
          tf_var_clerk_jwks_url: ${{ secrets.TF_VAR_CLERK_JWKS_URL }}
          tf_var_clerk_issuer: ${{ secrets.TF_VAR_CLERK_ISSUER }}
          upload_lambda_artifact: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

      - name: Deploy (Terraform apply, frontend, S3, CloudFront)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/deploy
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.DEFAULT_AWS_REGION }}
          tf_var_aurora_cluster_arn: ${{ secrets.TF_VAR_AURORA_CLUSTER_ARN }}
          tf_var_aurora_secret_arn: ${{ secrets.TF_VAR_AURORA_SECRET_ARN }}
          tf_var_vector_bucket: ${{ secrets.TF_VAR_VECTOR_BUCKET }}
          tf_var_polygon_api_key: ${{ secrets.TF_VAR_POLYGON_API_KEY }}
          tf_var_openai_api_key: ${{ secrets.TF_VAR_OPENAI_API_KEY }}
          tf_var_clerk_jwks_url: ${{ secrets.TF_VAR_CLERK_JWKS_URL }}
          tf_var_clerk_issuer: ${{ secrets.TF_VAR_CLERK_ISSUER }}
          next_public_clerk_publishable_key: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
